document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {

      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }

      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +

            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');

      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.

      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).

      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

al; color:#AC903D;\">good<\u002Fem> — and somehow that's the hard part.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ MARQUEE ============ -->\n  <div style=\"overflow:hidden; background:#80ffa6; padding:13px 0; border-top:3px solid #0F1F16; border-bottom:3px solid #0F1F16;\">\n    <div style=\"display:inline-flex; align-items:center; gap:26px; white-space:nowrap; animation:cpMarquee 32s linear infinite;\">\n      <span style=\"font-family:'Shrikhand',serif; font-size:25px; color:#1B3A2A;\">you deserve a better lunch<\u002Fspan><img src=\"22d6caee-8cb6-4794-8ab9-c863795187f0\" alt=\"\" style=\"height:28px;\">\n      <span style=\"font-family:'Shrikhand',serif; font-size:25px; color:#1B3A2A;\">crazy heart, serious sangüich<\u002Fspan><img src=\"22d6caee-8cb6-4794-8ab9-c863795187f0\" alt=\"\" style=\"height:28px;\">\n      <span style=\"font-family:'Shrikhand',serif; font-size:25px; color:#1B3A2A;\">you deserve a better lunch<\u002Fspan><img src=\"22d6caee-8cb6-4794-8ab9-c863795187f0\" alt=\"\" style=\"height:28px;\">\n      <span style=\"font-family:'Shrikhand',serif; font-size:25px; color:#1B3A2A;\">crazy heart, serious sangüich<\u002Fspan><img src=\"22d6caee-8cb6-4794-8ab9-c863795187f0\" alt=\"\" style=\"height:28px;\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ THE FRUSTRATION ============ -->\n  <section style=\"position:relative; background:#0F1F16; padding:clamp(54px,9vw,100px) clamp(20px,5vw,56px);\">\n    <div style=\"position:absolute; inset:0; pointer-events:none; background-image: repeating-linear-gradient(0deg, rgba(232,223,184,.05) 0 1px, transparent 1px 3px), repeating-linear-gradient(90deg, rgba(232,223,184,.04) 0 1px, transparent 1px 3px);\"><\u002Fdiv>\n    <div style=\"position:relative; max-width:1000px; margin:0 auto;\">\n      <div style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:800; font-size:13px; letter-spacing:4px; text-transform:uppercase; color:#E7E06A; text-align:center;\">The part nobody enjoys<\u002Fdiv>\n      <h2 style=\"font-family:'Anton',sans-serif; font-size:clamp(32px,6vw,62px); line-height:1; color:#80ffa6; text-align:center; margin:10px auto 40px; max-width:18ch;\">Sound like a lunch you've had?<\u002Fh2>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px;\">\n        <div style=\"background:#1B3A2A; border:2px solid rgba(172,144,61,.4); border-radius:16px; padding:28px;\">\n          <div style=\"font-family:'Shrikhand',serif; font-size:30px; color:#AC903D;\">“meh.”<\u002Fdiv>\n          <h3 style=\"font-family:'Anton',sans-serif; font-size:clamp(19px,2.4vw,23px); color:#80ffa6; margin:12px 0 8px; text-transform:uppercase;\">Vegetarian = boring<\u002Fh3>\n          <p style=\"font-size:15.5px; line-height:1.55; color:#E8DFB8; margin:0;\">You go meat-free and the menu shrinks to a sad side salad and a wrap that tastes like the fridge.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#1B3A2A; border:2px solid rgba(172,144,61,.4); border-radius:16px; padding:28px;\">\n          <div style=\"font-family:'Shrikhand',serif; font-size:30px; color:#AC903D;\">“what's in it?”<\u002Fdiv>\n          <h3 style=\"font-family:'Anton',sans-serif; font-size:clamp(19px,2.4vw,23px); color:#80ffa6; margin:12px 0 8px; text-transform:uppercase;\">Mystery ingredients<\u002Fh3>\n          <p style=\"font-size:15.5px; line-height:1.55; color:#E8DFB8; margin:0;\">Bleached flour, fillers, things you can't pronounce. You wanted lunch, not a chemistry quiz.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#1B3A2A; border:2px solid rgba(172,144,61,.4); border-radius:16px; padding:28px;\">\n          <div style=\"font-family:'Shrikhand',serif; font-size:30px; color:#AC903D;\">“same again?”<\u002Fdiv>\n          <h3 style=\"font-family:'Anton',sans-serif; font-size:clamp(19px,2.4vw,23px); color:#80ffa6; margin:12px 0 8px; text-transform:uppercase;\">Zero personality<\u002Fh3>\n          <p style=\"font-size:15.5px; line-height:1.55; color:#E8DFB8; margin:0;\">Every spot blurs together. Nothing surprises you, nothing's worth telling a friend about.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ THE JOURNEY ============ -->\n  <section style=\"position:relative; background:#1B3A2A; padding:clamp(56px,9vw,104px) clamp(20px,5vw,56px);\">\n    <div style=\"position:absolute; inset:0; pointer-events:none; background-image: repeating-linear-gradient(0deg, rgba(232,223,184,.05) 0 1px, transparent 1px 3px), repeating-linear-gradient(90deg, rgba(232,223,184,.04) 0 1px, transparent 1px 3px);\"><\u002Fdiv>\n    <div style=\"position:relative; max-width:860px; margin:0 auto;\">\n      <div style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:800; font-size:13px; letter-spacing:4px; text-transform:uppercase; color:#E7E06A; text-align:center;\">Then you find us<\u002Fdiv>\n      <h2 style=\"font-family:'Anton',sans-serif; font-size:clamp(32px,6vw,62px); line-height:1; color:#80ffa6; text-align:center; margin:10px auto 44px; max-width:16ch;\">How it goes with cuore pazzo<\u002Fh2>\n\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"display:flex; gap:20px; align-items:flex-start; background:#15301F; border-radius:16px; padding:clamp(20px,3vw,28px);\">\n          <div style=\"font-family:'Anton',sans-serif; font-size:clamp(34px,5vw,50px); line-height:1; color:#AC903D; flex:none;\">01<\u002Fdiv>\n          <div>\n            <h3 style=\"font-family:'Anton',sans-serif; font-size:clamp(20px,2.6vw,26px); color:#80ffa6; margin:2px 0 8px; text-transform:uppercase;\">You spot the crazy heart<\u002Fh3>\n            <p style=\"font-size:16px; line-height:1.55; color:#E8DFB8; margin:0;\">A grinning mascot, a name like <strong style=\"color:#E7E06A;\">FUHGETABOUTIT<\u002Fstrong>, and the smell of focaccia. You're curious before you've even read the menu.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:20px; align-items:flex-start; background:#15301F; border-radius:16px; padding:clamp(20px,3vw,28px);\">\n          <div style=\"font-family:'Anton',sans-serif; font-size:clamp(34px,5vw,50px); line-height:1; color:#AC903D; flex:none;\">02<\u002Fdiv>\n          <div>\n            <h3 style=\"font-family:'Anton',sans-serif; font-size:clamp(20px,2.6vw,26px); color:#80ffa6; margin:2px 0 8px; text-transform:uppercase;\">You order without compromise<\u002Fh3>\n            <p style=\"font-size:16px; line-height:1.55; color:#E8DFB8; margin:0;\">Every option is vegetarian, so there's no “what can I actually eat here?” math. Just pick the one that sounds the most unhinged.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:20px; align-items:flex-start; background:#15301F; border-radius:16px; padding:clamp(20px,3vw,28px);\">\n          <div style=\"font-family:'Anton',sans-serif; font-size:clamp(34px,5vw,50px); line-height:1; color:#AC903D; flex:none;\">03<\u002Fdiv>\n          <div>\n            <h3 style=\"font-family:'Anton',sans-serif; font-size:clamp(20px,2.6vw,26px); color:#80ffa6; margin:2px 0 8px; text-transform:uppercase;\">You take the first bite<\u002Fh3>\n            <p style=\"font-size:16px; line-height:1.55; color:#E8DFB8; margin:0;\">Sprouted whole-grain focaccia — crisp edge, pillowy middle, real ingredients. Bold flavour that actually lives up to the bold name.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:20px; align-items:flex-start; background:#15301F; border-radius:16px; padding:clamp(20px,3vw,28px);\">\n          <div style=\"font-family:'Anton',sans-serif; font-size:clamp(34px,5vw,50px); line-height:1; color:#AC903D; flex:none;\">04<\u002Fdiv>\n          <div>\n            <h3 style=\"font-family:'Anton',sans-serif; font-size:clamp(20px,2.6vw,26px); color:#80ffa6; margin:2px 0 8px; text-transform:uppercase;\">You become a regular<\u002Fh3>\n            <p style=\"font-size:16px; line-height:1.55; color:#E8DFB8; margin:0;\">You bring a friend. You pay forward a People's Cuore. You start counting down to the next weekend drop. <em style=\"font-style:normal; color:#E7E06A;\">Fatto con amore<\u002Fem>, returned.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ WHY WE EXIST ============ -->\n  <section style=\"position:relative; background:#80ffa6; padding:clamp(54px,9vw,100px) clamp(20px,5vw,56px); text-align:center; overflow:hidden;\">\n    <img src=\"33156acc-4be0-4294-88ac-732ea49e38d4\" alt=\"\" style=\"--rot:-8deg; width:clamp(96px,14vw,150px); transform:rotate(-8deg); filter:drop-shadow(3px 6px 0 rgba(0,0,0,.2)); margin-bottom:6px;\">\n    <h2 style=\"font-family:'Anton',sans-serif; font-size:clamp(30px,6vw,58px); line-height:1; color:#0F1F16; margin:0 auto 16px; text-transform:uppercase; max-width:18ch;\">Lunch should make you feel something<\u002Fh2>\n    <p style=\"font-size:clamp(16px,2.3vw,20px); line-height:1.6; color:#143726; max-width:600px; margin:0 auto 28px;\">We started Cuore Pazzo because “vegetarian” shouldn't mean settling, and a sangüich shouldn't be forgettable. Real grain, wild flavour, a little chaos, and a cuore for whoever needs one. That's the whole idea.<\u002Fp>\n    <a href=\"#/menu.dc\" style=\"display:inline-flex; align-items:center; gap:8px; background:#0F1F16; color:#80ffa6; font-family:'Anton',sans-serif; font-size:clamp(15px,2vw,18px); letter-spacing:.5px; text-transform:uppercase; padding:15px 30px; border-radius:40px; text-decoration:none;\" style-hover=\"background:#1B3A2A;\">Start your story →<\u002Fa>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER MARQUEE ============ -->\n  <div style=\"overflow:hidden; background:#80ffa6; padding:12px 0; border-top:3px solid #0F1F16;\">\n    <div style=\"display:inline-flex; align-items:center; gap:26px; white-space:nowrap; animation:cpMarquee 30s linear infinite reverse;\">\n      <span style=\"font-family:'Shrikhand',serif; font-size:24px; color:#1B3A2A;\">cuore pazzo<\u002Fspan><img src=\"22d6caee-8cb6-4794-8ab9-c863795187f0\" alt=\"\" style=\"height:28px;\">\n      <span style=\"font-family:'Shrikhand',serif; font-size:24px; color:#1B3A2A;\">fatto con amore<\u002Fspan><img src=\"22d6caee-8cb6-4794-8ab9-c863795187f0\" alt=\"\" style=\"height:28px;\">\n      <span style=\"font-family:'Shrikhand',serif; font-size:24px; color:#1B3A2A;\">crazy heart, serious sangüich<\u002Fspan><img src=\"22d6caee-8cb6-4794-8ab9-c863795187f0\" alt=\"\" style=\"height:28px;\">\n      <span style=\"font-family:'Shrikhand',serif; font-size:24px; color:#1B3A2A;\">cuore pazzo<\u002Fspan><img src=\"22d6caee-8cb6-4794-8ab9-c863795187f0\" alt=\"\" style=\"height:28px;\">\n      <span style=\"font-family:'Shrikhand',serif; font-size:24px; color:#1B3A2A;\">fatto con amore<\u002Fspan><img src=\"22d6caee-8cb6-4794-8ab9-c863795187f0\" alt=\"\" style=\"height:28px;\">\n      <span style=\"font-family:'Shrikhand',serif; font-size:24px; color:#1B3A2A;\">crazy heart, serious sangüich<\u002Fspan><img src=\"22d6caee-8cb6-4794-8ab9-c863795187f0\" alt=\"\" style=\"height:28px;\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:#0B1610; padding:clamp(44px,7vw,72px) clamp(20px,5vw,56px) 34px;\">\n    <div style=\"max-width:1080px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:34px 28px;\">\n      <div>\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:12px;\">\n          <img src=\"33156acc-4be0-4294-88ac-732ea49e38d4\" alt=\"\" style=\"height:34px;\">\n          <span style=\"font-family:'Shrikhand',serif; font-size:23px; color:#80ffa6;\">cuore pazzo<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:14.5px; line-height:1.55; color:#9FB3A2; margin:0; max-width:240px;\">Vegetarian focaccia sangüiches with bold flavours and even bolder names. Made in Markham, fatto con amore.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Anton',sans-serif; font-size:14px; letter-spacing:1px; text-transform:uppercase; color:#AC903D; margin-bottom:12px;\">Hours<\u002Fdiv>\n        <p style=\"font-size:14.5px; line-height:1.7; color:#E8DFB8; margin:0;\">Fri &amp; Sat · 11am – 6pm<br>Sunday · 11am – 4pm<br><span style=\"color:#9FB3A2;\">Mon–Thu · closed<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Anton',sans-serif; font-size:14px; letter-spacing:1px; text-transform:uppercase; color:#AC903D; margin-bottom:12px;\">Visit / Reach<\u002Fdiv>\n        <p style=\"font-size:14.5px; line-height:1.7; color:#E8DFB8; margin:0;\">Markham, ON<br>Email <span style=\"color:#5d6f60;\">— coming soon<\u002Fspan><br>@cuorepazzo <span style=\"color:#5d6f60;\">— coming soon<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Anton',sans-serif; font-size:14px; letter-spacing:1px; text-transform:uppercase; color:#AC903D; margin-bottom:12px;\">Explore<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <a href=\"#/index.dc\" style=\"font-size:14.5px; color:#E8DFB8; text-decoration:none;\" style-hover=\"color:#80ffa6;\">Home<\u002Fa>\n          <a href=\"#/menu.dc\" style=\"font-size:14.5px; color:#E8DFB8; text-decoration:none;\" style-hover=\"color:#80ffa6;\">Menu<\u002Fa>\n          <a href=\"#/story.dc\" style=\"font-size:14.5px; color:#E8DFB8; text-decoration:none;\" style-hover=\"color:#80ffa6;\">Your Story<\u002Fa>\n          <a href=\"#/contact.dc\" style=\"font-size:14.5px; color:#E8DFB8; text-decoration:none;\" style-hover=\"color:#80ffa6;\">Contact<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1080px; margin:34px auto 0; padding-top:20px; border-top:1px solid rgb
